# Netlify configuration — First Connections Network
# Place this file in the ROOT of your GitHub repository

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Serve the SPA at /funding-support without changing the URL bar
[[redirects]]
  from = "/funding-support"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/funding-support/"
  to = "/index.html"
  status = 200

# ── Security headers ────────────────────────────────────────
# Cheap defense-in-depth. If you tighten the CSP further,
# remember to add any new third-party host we start calling
# from client-side JS (Brevo / Airtable are proxied via our
# own functions so they don't need to be listed).
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options   = "nosniff"
    X-Frame-Options          = "SAMEORIGIN"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy  = "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://raw.githubusercontent.com https://v5.airtableusercontent.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' mailto:;"
